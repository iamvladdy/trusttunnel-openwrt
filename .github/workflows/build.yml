name: Build and Release Packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWRT version (e.g., 25.12.2)'
        required: true
        type: string

jobs:
  build:
    name: "${{ matrix.target }}/${{ matrix.subtarget }} (${{ matrix.pkgarch }})"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Flint 2, Xiaomi AX6000, etc — MT7986A
          - target: mediatek
            subtarget: filogic
            pkgarch: aarch64_cortex-a53

          # GL.iNet Slate AX, Raspberry Pi etc — generic aarch64
          - target: armsr
            subtarget: armv8
            pkgarch: aarch64_generic

          # Most TP-Link, Xiaomi (older) — MT7621
          - target: ramips
            subtarget: mt7621
            pkgarch: mipsel_24kc

          # Older Atheros routers
          - target: ath79
            subtarget: generic
            pkgarch: mips_24kc

          # x86 (VMs, PC routers)
          - target: x86
            subtarget: 64
            pkgarch: x86_64

          # Armv7 (older ARM routers)
          - target: armsr
            subtarget: armv7
            pkgarch: arm_cortex-a9

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get OpenWRT version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          fi

      - name: Cache OpenWRT SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: openwrt-sdk-*/
          key: sdk-${{ env.VERSION }}-${{ matrix.target }}-${{ matrix.subtarget }}

      - name: Download OpenWRT SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          BASE="https://downloads.openwrt.org/releases/${{ env.VERSION }}/targets/${{ matrix.target }}/${{ matrix.subtarget }}"
          SDK_FILE=$(curl -s "$BASE/" \
            | grep -o "openwrt-sdk-[^\"]*\.Linux-x86_64\.tar\.[xz|zst]*" \
            | head -1)

          if [ -z "$SDK_FILE" ]; then
            echo "SDK not found for ${{ env.VERSION }} ${{ matrix.target }}/${{ matrix.subtarget }}"
            exit 1
          fi

          echo "Downloading $SDK_FILE"
          wget -q "$BASE/$SDK_FILE"

          if [[ "$SDK_FILE" == *.tar.zst ]]; then
            tar --zstd -xf "$SDK_FILE"
          else
            tar -xf "$SDK_FILE"
          fi
          rm "$SDK_FILE"

      - name: Setup feeds and copy packages
        run: |
          SDK=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -1)

          cd "$SDK"
          ./scripts/feeds update -a 2>&1 | tail -5
          ./scripts/feeds install -a 2>&1 | tail -5

          # Copy our packages into the SDK
          cp -r "$GITHUB_WORKSPACE/trusttunnel-tools"     package/
          cp -r "$GITHUB_WORKSPACE/luci-app-trusttunnel"  package/

          # Select packages to build
          {
            echo "CONFIG_PACKAGE_trusttunnel-tools=y"
            echo "CONFIG_PACKAGE_luci-app-trusttunnel=y"
          } > .config

          make defconfig 2>&1 | tail -3

      - name: Build packages
        run: |
          SDK=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -1)
          cd "$SDK"

          make package/trusttunnel-tools/{download,prepare,compile} V=s 2>&1 | tail -20
          make package/luci-app-trusttunnel/{download,prepare,compile} V=s 2>&1 | tail -20

          echo "Built packages:"
          find bin/ -name "*.?pk" | grep trusttunnel

      - name: Collect artifacts
        run: |
          SDK=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -1)
          mkdir -p release

          POSTFIX="v${{ env.VERSION }}_${{ matrix.pkgarch }}_${{ matrix.target }}_${{ matrix.subtarget }}"

          find "$SDK/bin" -name "trusttunnel-tools*.?pk" | while read f; do
            ext="${f##*.}"
            cp "$f" "release/trusttunnel-tools_${POSTFIX}.${ext}"
          done

          find "$SDK/bin" -name "luci-app-trusttunnel*.?pk" | while read f; do
            ext="${f##*.}"
            cp "$f" "release/luci-app-trusttunnel_${POSTFIX}.${ext}"
          done

          ls -lh release/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.?pk
          tag_name: v${{ env.VERSION }}
          generate_release_notes: true
